name: Daily Threat Intel Feed

on:
  schedule:
    # Runs every day at 07:00 UTC (good for morning briefings)
    - cron: "0 7 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit the JSON report back to the repo

jobs:
  run-feed:
    runs-on: ubuntu-latest   # free on GitHub Actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen-articles database
        uses: actions/cache@v4
        with:
          path: seen_articles.db
          key: seen-articles-db-${{ github.run_id }}
          restore-keys: |
            seen-articles-db-

      - name: Run threat intel pipeline
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
          SLACK_WEBHOOK:    ${{ secrets.SLACK_WEBHOOK }}
          DB_PATH:          seen_articles.db
        run: python threat_intel.py

      - name: Commit JSON reports and newsletter to repository
        run: |
          git config user.name  "Threat Intel Bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "📊 Daily threat report $(date -u +%Y-%m-%d)"
          git push
        continue-on-error: true   # don't fail the workflow if nothing changed
